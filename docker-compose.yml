services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fittracker
      POSTGRES_PASSWORD: fittracker
      POSTGRES_DB: fittracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fittracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://fittracker:fittracker@db:5432/fittracker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
